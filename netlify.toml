[build]
  command = "npm run build"

[build.environment]
  # Next.js 16 requires a modern Node runtime.
  NODE_VERSION = "20"

# Official adapter that turns the Next.js build into Netlify Functions/Edge.
# Netlify auto-detects this, but pinning it here is explicit and stable.
[[plugins]]
  package = "@netlify/plugin-nextjs"
